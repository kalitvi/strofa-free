<svg xmlns="http://www.w3.org/2000/svg" width="400" height="100" viewBox="0 0 400 100">
  <!-- Background -->
  <rect width="400" height="100" rx="16" fill="#18181b"/>

  <!-- Line number dots (6 dots) -->
  <g fill="#fff" opacity="0.35">
    <circle cx="30" cy="18" r="3.5"/>
    <circle cx="30" cy="30" r="3.5"/>
    <circle cx="30" cy="42" r="3.5"/>
    <circle cx="30" cy="54" r="3.5"/>
    <circle cx="30" cy="66" r="3.5"/>
    <circle cx="30" cy="78" r="3.5"/>
  </g>

  <!-- Stanza Blocks Icon (6 lines) -->
  <g transform="translate(42, 13)">
    <rect x="0" y="0" width="36" height="8" rx="2" fill="#fff"/>
    <rect x="0" y="12" width="23" height="8" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="10" y="24" width="26" height="8" rx="2" fill="#fff" opacity="0.75"/>
    <rect x="10" y="36" width="36" height="8" rx="2" fill="#fff"/>
    <rect x="22" y="48" width="23" height="8" rx="2" fill="#fff" opacity="0.6"/>
    <rect x="10" y="60" width="36" height="8" rx="2" fill="#fff"/>
  </g>

  <!-- Text: strofa -->
  <text x="100" y="62" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="42" font-weight="600" fill="#fff">strofa</text>

  <!-- Free Edition badge -->
  <rect x="260" y="36" width="110" height="26" rx="6" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.7"/>
  <text x="315" y="54" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#a855f7" text-anchor="middle">Free Edition</text>
</svg>
